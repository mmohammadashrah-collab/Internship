<!DOCTYPE.html>
<html>
    <head>
        <title> Dropdown Menu </title>
    </head>
    <body>
        <style>
            .dropdown: hover.menu;
            display: block;
        }
        .menu {
            display: none;
        }
        </style>
        <div class="dropdown">
            <menu>
                <div class="dropdown">
                    <p>item 1</p>
                    <p>item 2</p>
                </div>
            </div>
